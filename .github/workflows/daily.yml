name: Daily Mileage Tracker

on:
  schedule:
    # GitHub schedule can start late. Start at 21:37 Beijing time,
    # then wait inside the job and scrape at about 00:10 Beijing time.
    - cron: "37 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync latest main
        run: |
          git pull --rebase origin main

      - name: Wait until target scrape time
        shell: bash
        run: |
          target=$(date -u -d "$(date -u +%F) 16:10:00" +%s)
          now=$(date -u +%s)

          if [ "$now" -lt "$target" ]; then
            wait_seconds=$((target - now))
            echo "Waiting ${wait_seconds}s until 00:10 Beijing time"
            sleep "$wait_seconds"
          else
            late_seconds=$((now - target))
            echo "Schedule started ${late_seconds}s after 00:10 Beijing time; scraping now"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - run: python scrape.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data.csv daily.json monthly.json summary.json
          git commit -m "update mileage data and generated json" || echo "no changes"

          git push origin HEAD:main
