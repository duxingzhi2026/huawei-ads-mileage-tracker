<!doctype html>
<html lang="zh-CN">
<head>
 <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>华为乾崑智驾数据展示</title>

<meta name="description" content="实时追踪华为乾崑辅助驾驶累计里程、总里程与使用占比">

<meta property="og:title" content="华为乾崑智驾数据展示">
<meta property="og:description" content="每日自动更新｜辅助驾驶里程｜总驾驶里程｜占比趋势">
<meta property="og:type" content="website">
<meta property="og:url" content="https://duxingzhi2026.github.io/huawei-ads-mileage-tracker/">
<meta property="og:image" content="https://duxingzhi2026.github.io/huawei-ads-mileage-tracker/share.jpg">

<meta name="twitter:card" content="summary_large_image">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at top, #111827 0%, #05070a 45%, #000 100%);
      color: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
    }

    .sub {
      color: #9aa4b2;
      margin-bottom: 24px;
      font-size: 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(8, 12, 18, 0.96));
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
    }

    .card-title {
      color: #aab4c3;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card-value {
      color: #2f80ff;
      font-size: 30px;
      font-weight: 750;
      line-height: 1.2;
      word-break: break-word;
    }

    .card-small {
      color: #8f99aa;
      margin-top: 6px;
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
      gap: 8px;
    }

    .toolbar button {
      background: #111827;
      color: #dbeafe;
      border: 1px solid #334155;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.active {
      background: #2563eb;
      border-color: #3b82f6;
      color: white;
    }

    .chart-box {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(7, 11, 17, 0.96));
      border: 1px solid #1f2937;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
    }

    #barChart,
    #lineChart {
      width: 100%;
      height: 420px;
    }

    .footer {
      color: #6b7280;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .cards {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 25px;
      }

      .sub {
        font-size: 13px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .card {
        padding: 14px;
      }

      .card-value {
        font-size: 22px;
      }

      #barChart,
      #lineChart {
        height: 360px;
      }
    }

@media (max-width: 520px) {
  body {
    padding: 12px;
  }

  h1 {
    font-size: 18px;
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 18px;
  }

  /* 三个卡片仍然一行显示 */
  .cards {
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .card {
    padding: 14px 10px;
    border-radius: 20px;
    min-height: 60px;
  }

  /* 标题缩小 */
  .card-title {
    font-size: 12px;
    line-height: 1.35;
    margin-bottom: 12px;
  }

  /* 核心数字缩小，解决换行过大问题 */
  .card-value {
    font-size: 20px;
    line-height: 1.05;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    word-break: break-word;
  }

  /* 单位文字 */
  .card-unit {
    font-size: 10px;
    line-height: 1.3;
  }

  /* 按钮区 */
  .toolbar {
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }

  .toolbar button {
    flex: 1;
    font-size: 16px;
    padding: 10px 0;
  }

  /* 图表高度 */
  #barChart,
  #lineChart {
    height: 300px;
  }
}
  </style>
</head>

<body>
  <h1>华为乾崑智驾数据展示</h1>
  <div class="sub">原始数据来源：华为乾崑官网｜每日凌晨自动更新</div>

  <div class="cards">
    <div class="card">
      <div class="card-title">累计辅助驾驶</div>
      <div class="card-value" id="assistTotal">-</div>
      <div class="card-small">亿公里</div>
    </div>

    <div class="card">
      <div class="card-title">累计总驾驶</div>
      <div class="card-value" id="driveTotal">-</div>
      <div class="card-small">亿公里</div>
    </div>

    <div class="card">
      <div class="card-title">辅助驾驶比例</div>
      <div class="card-value" id="totalRatio">-</div>
    </div>
  </div>

  <div class="toolbar">
    <button id="dailyBtn" class="active">按天</button>
    <button id="monthlyBtn">按月</button>
  </div>

  <div class="chart-box">
    <div id="barChart"></div>
  </div>

  <div class="chart-box">
    <div id="lineChart"></div>
  </div>

  <div class="footer">
    * 蓝色为辅助驾驶里程，灰色为人工驾驶里程。<br>
    * 本页面为自动化数据追踪展示。作者：笃行之
  </div>

  <script>
    let dailyRows = [];
    let monthlyRows = [];
    let mode = "daily";
    let barChart = null;
    let lineChart = null;

    function numberFormat(n) {
      return Number(n || 0).toLocaleString();
    }

    function percentFormat(n) {
      return (Number(n || 0) * 100).toFixed(2) + "%";
    }

    function getDisplayRows() {
      return mode === "monthly" ? monthlyRows : dailyRows;
    }

    function render() {
      const rows = getDisplayRows();
      if (!rows.length) return;

      const last = rows[rows.length - 1];

      document.getElementById("assistTotal").innerText = (Number(last.assist_total)/100000000).toFixed(2);
      document.getElementById("driveTotal").innerText = (Number(last.drive_total)/100000000).toFixed(2);
      document.getElementById("totalRatio").innerText = percentFormat(
        Number(last.assist_total || 0) / Number(last.drive_total || 0)
      );

      // 第一条样本是建档基准，没有本期增量；图表从第二条开始展示
      const chartRows = rows.slice(1);
      const dates = chartRows.map(r => r.date);
      const assist = chartRows.map(r => Number(r.daily_assist || 0) / 100000000);
      const total = chartRows.map(r => Number(r.daily_drive || 0) / 100000000);
      const human = total.map((v, i) => Math.max(v - assist[i], 0));
      const ratio = chartRows.map(r => Number(r.ratio || 0) * 100);

      const textColor = "#d1d5db";
      const gridColor = "#1f2937";

      if (!barChart) {
        barChart = echarts.init(document.getElementById("barChart"));
      }

      if (!lineChart) {
        lineChart = echarts.init(document.getElementById("lineChart"));
      }

      barChart.setOption({
        backgroundColor: "transparent",
        title: {
          text: mode === "daily" ? "每日新增里程" : "每月新增里程",
          textStyle: { color: textColor, fontSize: 18 }
        },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "shadow" },
          formatter: function(params) {
            const a = params.find(p => p.seriesName === "辅助驾驶");
            const h = params.find(p => p.seriesName === "人工驾驶");
            const totalValue = Number(a.value) + Number(h.value);
            const pct = totalValue ? Number(a.value) / totalValue * 100 : 0;

            return `${params[0].axisValue}<br>
              辅助驾驶：${Number(a.value).toFixed(4)} 亿公里<br>
              人工驾驶：${Number(h.value).toFixed(4)} 亿公里<br>
              总里程：${totalValue.toFixed(4)} 亿公里<br>
              占比：${pct.toFixed(2)}%`;
          }
        },
        legend: {
          data: ["辅助驾驶", "人工驾驶"],
          top: 32,
          textStyle: { color: textColor }
        },
        grid: { left: 64, right: 26, top: 82, bottom: 52 },
        xAxis: {
          type: "category",
          data: dates,
          axisLabel: { color: textColor },
          axisLine: { lineStyle: { color: gridColor } }
        },
        yAxis: {
          type: "value",
          name: "亿公里",
          nameTextStyle: { color: textColor },
          axisLabel: { color: textColor },
          splitLine: { lineStyle: { color: gridColor } }
        },
        series: [
          {
            name: "辅助驾驶",
            type: "bar",
            stack: "total",
            data: assist,
            itemStyle: { color: "#2f80ff" }
          },
          {
            name: "人工驾驶",
            type: "bar",
            stack: "total",
            data: human,
            itemStyle: { color: "#6b7280" }
          }
        ]
      });

      lineChart.setOption({
        backgroundColor: "transparent",
        title: {
          text: mode === "daily" ? "每日辅助驾驶占比趋势" : "每月辅助驾驶占比趋势",
          textStyle: { color: textColor, fontSize: 18 }
        },
        tooltip: {
          trigger: "axis",
          formatter: function(params) {
            return `${params[0].axisValue}<br>辅助驾驶占比：${params[0].data.toFixed(2)}%`;
          }
        },
        grid: { left: 64, right: 26, top: 76, bottom: 52 },
        xAxis: {
          type: "category",
          data: dates,
          axisLabel: { color: textColor },
          axisLine: { lineStyle: { color: gridColor } }
        },
        yAxis: {
          type: "value",
          name: "%",
          min: 0,
          max: 50,
          nameTextStyle: { color: textColor },
          axisLabel: { color: textColor },
          splitLine: { lineStyle: { color: gridColor } }
        },
        series: [
          {
            name: "辅助驾驶占比",
            type: "line",
            smooth: true,
            symbolSize: 7,
            data: ratio,
            lineStyle: { width: 3, color: "#2f80ff" },
            itemStyle: { color: "#2f80ff" },
            areaStyle: {
              color: "rgba(47, 128, 255, 0.12)"
            }
          }
        ]
      });
    }

    async function loadJson(path) {
      const res = await fetch(`${path}?t=${Date.now()}`);
      if (!res.ok) {
        throw new Error(`无法读取 ${path}`);
      }
      return await res.json();
    }

    async function main() {
      [dailyRows, monthlyRows] = await Promise.all([
        loadJson("daily.json"),
        loadJson("monthly.json")
      ]);

      document.getElementById("dailyBtn").onclick = () => {
        mode = "daily";
        document.getElementById("dailyBtn").classList.add("active");
        document.getElementById("monthlyBtn").classList.remove("active");
        render();
      };

      document.getElementById("monthlyBtn").onclick = () => {
        mode = "monthly";
        document.getElementById("monthlyBtn").classList.add("active");
        document.getElementById("dailyBtn").classList.remove("active");
        render();
      };

      render();

      window.addEventListener("resize", () => {
        if (barChart) barChart.resize();
        if (lineChart) lineChart.resize();
      });
    }

    main().catch(err => {
      console.error(err);
      document.querySelector(".sub").innerText = "数据读取失败，请检查 daily.json / monthly.json 是否已生成。";
    });
  </script>
</body>
</html>
