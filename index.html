<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>华为乾崑辅助驾驶里程追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
</head>
<body>
  <h2>华为乾崑辅助驾驶里程追踪</h2>
  <div id="latest" style="margin:15px 0;font-size:18px;"></div>
  <div id="chart" style="width:100%;height:500px;"></div>

 <script>
async function main() {
  const res = await fetch("data.csv?t=" + Date.now());
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1).map(r => r.split(","));

  const dates = rows.map(r => r[0]);

  // ratio 在最后一列
  const ratio = rows.map(r => Number(r[r.length - 1]) * 100);

  const last = rows[rows.length - 1];

  document.getElementById("latest").innerHTML = `
    <b>最近一次抓取：</b><br>
    累计辅助驾驶里程：${Number(last[1]).toLocaleString()}<br>
    累计总驾驶里程：${Number(last[2]).toLocaleString()}
  `;

  const chart = echarts.init(document.getElementById("chart"));

  chart.setOption({
    title: {
      text: "华为乾崑辅助驾驶占比趋势"
    },

    tooltip: {
      trigger: "axis",
      formatter: function(params) {
        return params[0].axisValue + "<br>" +
               "辅助驾驶占比：" + params[0].data.toFixed(2) + "%";
      }
    },

    legend: {
      data: ["辅助驾驶占比"]
    },

    xAxis: {
      type: "category",
      data: dates
    },

    yAxis: {
      type: "value",
      name: "%",
      min: 0,
      max: 100
    },

    series: [
      {
        name: "辅助驾驶占比",
        type: "line",
        smooth: true,
        symbolSize: 8,
        data: ratio
      }
    ]
  });
}

main();
</script>
</body>
</html>
